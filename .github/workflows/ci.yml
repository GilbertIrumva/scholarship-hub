name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch: {}

# Cancel in-progress runs when a new commit lands on the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: project
    env:
      NODE_ENV: test
      # Pin the binary version so the cache key is deterministic. Bump in
      # lockstep with mongodb-memory-server.
      MONGOMS_VERSION: '7.0.14'
      MONGOMS_DOWNLOAD_DIR: ${{ github.workspace }}/.cache/mongodb-binaries
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: project/package-lock.json
      # Match the npm version that generated the lockfile (npm 11). Node 22
      # ships with npm 10, which mis-reads npm 11-generated lockfile metadata
      # and fails `npm ci` instantly.
      - name: Upgrade npm to match lockfile
        run: npm install -g npm@11
      # Cache BEFORE running tests so the first cold run still benefits from
      # any previously-cached binary. (Previously the cache step ran AFTER
      # `npm test`, meaning every run re-downloaded the 100 MB binary.)
      - name: Cache MongoDB binaries
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.cache/mongodb-binaries
          key: mongo-binaries-${{ runner.os }}-${{ env.MONGOMS_VERSION }}
          restore-keys: |
            mongo-binaries-${{ runner.os }}-
      - name: Install dependencies
        shell: bash
        run: |
          set +e
          npm ci --foreground-scripts 2>&1 | tee /tmp/npm-ci-backend.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "::group::npm ci failed (exit $rc) — full output"
            cat /tmp/npm-ci-backend.log
            echo "::endgroup::"
            tail -20 /tmp/npm-ci-backend.log | while IFS= read -r line; do
              printf '::error::%s\n' "$line"
            done
          fi
          exit $rc
      - name: Run vitest suite
        run: npm test

  frontend:
    name: Frontend (lint + build + tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Upgrade npm to match lockfile
        run: npm install -g npm@11
      - name: Install dependencies
        shell: bash
        run: |
          set +e
          npm ci --foreground-scripts 2>&1 | tee /tmp/npm-ci-frontend.log
          rc=${PIPESTATUS[0]}
          if [ "$rc" -ne 0 ]; then
            echo "::group::npm ci failed (exit $rc) — full output"
            cat /tmp/npm-ci-frontend.log
            echo "::endgroup::"
            tail -20 /tmp/npm-ci-frontend.log | while IFS= read -r line; do
              printf '::error::%s\n' "$line"
            done
          fi
          exit $rc
      - name: Lint
        run: npm run lint
      - name: Build production bundle
        run: npm run build
      - name: Run vitest suite
        run: npm test
